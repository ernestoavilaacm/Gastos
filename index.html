const SCRIPT_CODE=`const SHEET='Gastos', HIST='Historial';
function doGet(e){
  const a=e.parameter.action||'read',ss=SpreadsheetApp.getActiveSpreadsheet();
  if(a==='read'){
    const sh=ss.getSheetByName(SHEET)||ss.insertSheet(SHEET);
    const rows=sh.getDataRange().getValues();
    if(rows.length<2)return ok({expenses:[]});
    const h=rows[0];
    return ok({expenses:rows.slice(1).map(r=>{const o={};h.forEach((k,i)=>o[k]=r[i]);return o;})});
  }
  if(a==='write'){
    const d=JSON.parse(decodeURIComponent(e.parameter.data));
    const sh=ss.getSheetByName(SHEET)||ss.insertSheet(SHEET);
    sh.clearContents();
    sh.appendRow(Object.keys(d[0]));
    d.forEach(r=>sh.appendRow(Object.values(r)));
    return ok({ok:true});
  }
  if(a==='history'){
    const d=JSON.parse(decodeURIComponent(e.parameter.data));
    const sh=ss.getSheetByName(HIST)||ss.insertSheet(HIST);
    if(sh.getLastRow()===0)sh.appendRow(['month','year','totalPaid','snapshot']);
    sh.appendRow([d.month,d.year,d.totalPaid,JSON.stringify(d.items)]);
    return ok({ok:true});
  }
  return ok({error:'unknown'});
}
function ok(d){return ContentService.createTextOutput(JSON.stringify(d)).setMimeType(ContentService.MimeType.JSON);}`;

// ── HELPERS ────────────────────────────────────────────────
const fmtC=(n,c)=>{
  const v=Math.abs(Number(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return c==='MXN'?`$${v} MXN`:`C$${v}`;
};
const toCAD=(a,c,r)=>c==='MXN'?Number(a)*r:Number(a);
const genId=()=>'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const stCls=(s)=>s==='Pagado'?'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300':
  s==='Vencido'?'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300':
  'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300';
const inPeriod=(e,v)=>v==='all'?true:v==='q1'?(e.day<=15||e.freq==='Biweekly'):v==='q2'?(e.day>15||e.freq==='Biweekly'):true;

// ── MODAL ─────────────────────────────────────────────────
function Modal({title,onClose,children}){
  useEffect(()=>{
    const h=ev=>{if(ev.key==='Escape')onClose();};
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);
  return(
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm fade-in">
      <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 w-full max-w-lg max-h-[90vh] flex flex-col">
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
          <span className="font-display font-bold text-slate-800 dark:text-slate-100 text-base">{title}</span>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 text-xl transition">&times;</button>
        </div>
        <div className="p-6 overflow-y-auto">{children}</div>
      </div>
    </div>
  );
}

// ── EXPENSE FORM ──────────────────────────────────────────
function ExpForm({init,onSave,onCancel,t}){
  const blank={id:'',name:'',cat:'Vivienda',amt:'',cur:'CAD',freq:'Mensual',day:'1',owed:'',st:'Pendiente',acct:'TD Chequing',notes:''};
  const [f,setF]=useState(init?{...init,amt:init.amt,owed:init.owed,day:init.day}:blank);
  const [err,setErr]=useState('');
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const submit=()=>{
    if(!f.name.trim()){setErr(t.nameReq);return;}
    onSave({...f,id:f.id||genId(),amt:parseFloat(f.amt)||0,owed:parseFloat(f.owed)||0,day:parseInt(f.day)||1});
  };
  const inp='w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-600 transition';
  const lbl='block text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1.5';
  return(
    <div className="space-y-4">
      {err&&<div className="text-red-500 text-sm bg-red-50 dark:bg-red-900/30 px-3 py-2 rounded-lg">{err}</div>}
      <div>
        <label className={lbl}>{t.name} *</label>
        <input className={inp} value={f.name} onChange={e=>{setErr('');set('name',e.target.value);}}/>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className={lbl}>{t.account.split(' ')[0]} Cat.</label>
          <select className={inp} value={f.cat} onChange={e=>set('cat',e.target.value)}>
            {CATS.map(c=><option key={c} value={c}>{CAT_ICO[c]} {c}</option>)}
          </select>
        </div>
        <div>
          <label className={lbl}>{t.currency}</label>
          <select className={inp} value={f.cur} onChange={e=>set('cur',e.target.value)}>
            <option>CAD</option><option>MXN</option>
          </select>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className={lbl}>{t.amount}</label>
          <input type="number" step="0.01" min="0" className={inp} value={f.amt} onChange={e=>set('amt',e.target.value)}/>
        </div>
        <div>
          <label className={lbl}>{t.totalOwedF}</label>
          <input type="number" step="0.01" min="0" className={inp} value={f.owed} onChange={e=>set('owed',e.target.value)}/>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className={lbl}>{t.payDay}</label>
          <input type="number" min="1" max="31" className={inp} value={f.day} onChange={e=>set('day',e.target.value)}/>
        </div>
        <div>
          <label className={lbl}>{t.freq}</label>
          <select className={inp} value={f.freq} onChange={e=>set('freq',e.target.value)}>
            {FREQS.map(x=><option key={x}>{x}</option>)}
          </select>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className={lbl}>{t.status}</label>
          <select className={inp} value={f.st} onChange={e=>set('st',e.target.value)}>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div>
          <label className={lbl}>{t.account}</label>
          <select className={inp} value={f.acct} onChange={e=>set('acct',e.target.value)}>
            {ACCTS.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
      </div>
      <div>
        <label className={lbl}>{t.notes}</label>
        <input className={inp} value={f.notes} onChange={e=>set('notes',e.target.value)}/>
      </div>
      <div className="flex gap-3 pt-1">
        <button onClick={submit} className="flex-1 py-2.5 bg-blue-800 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold transition">{t.save}</button>
        <button onClick={onCancel} className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-xl text-sm font-semibold transition">{t.cancel}</button>
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────
function Dashboard({exps,rate,t,lang,month,year,setRate,apiUrl,setApiUrl,onSync,loading,syncMsg}){
  const months=lang==='es'?MONTHS_ES:MONTHS_EN;
  const today=new Date().getDate();
  const [ri,setRi]=useState(rate);
  const [ai,setAi]=useState(apiUrl);
  const [showApi,setShowApi]=useState(false);
  useEffect(()=>setRi(rate),[rate]);
  useEffect(()=>setAi(apiUrl),[apiUrl]);

  const total=exps.reduce((s,e)=>s+toCAD(e.amt,e.cur,rate),0);
  const paid =exps.filter(e=>e.st==='Pagado').reduce((s,e)=>s+toCAD(e.amt,e.cur,rate),0);
  const pend =total-paid;
  const owed =exps.reduce((s,e)=>s+toCAD(e.owed,e.cur,rate),0);
  const paidN=exps.filter(e=>e.st==='Pagado').length;
  const pct  =exps.length?Math.round(paidN/exps.length*100):0;

  const alerts=exps.filter(e=>{const d=e.day-today;return d>=0&&d<=3&&e.st!=='Pagado';}).sort((a,b)=>a.day-b.day);

  const catTotals=CATS.map(c=>({
    name:c,
    val:exps.filter(e=>e.cat===c).reduce((s,e)=>s+toCAD(e.amt,e.cur,rate),0)
  })).filter(x=>x.val>0);

  const card='bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-5 shadow-sm';

  return(
    <div className="space-y-5 fade-in">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <h2 className="font-display text-2xl font-bold">{months[month]} <span className="text-slate-400 font-normal">{year}</span></h2>
        {!apiUrl&&<span className="text-xs bg-amber-50 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 border border-amber-200 dark:border-amber-700/40 px-3 py-1.5 rounded-full">{t.demo}</span>}
      </div>

      {/* Cards */}
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-3">
        {[
          {lb:t.totalOwed,val:fmtC(owed,'CAD'), clr:'#dc2626',ic:'💸'},
          {lb:t.toPay,    val:fmtC(total,'CAD'),clr:'#1d4ed8',ic:'📋'},
          {lb:t.paid,     val:fmtC(paid,'CAD'), clr:'#059669',ic:'✅'},
          {lb:t.pending,  val:fmtC(pend,'CAD'), clr:'#d97706',ic:'⏳'},
        ].map(({lb,val,clr,ic})=>(
          <div key={lb} className={`${card} border-l-4`} style={{borderLeftColor:clr}}>
            <div className="flex justify-between mb-3">
              <span className="text-xs font-semibold text-slate-400 uppercase tracking-wide">{lb}</span>
              <span className="text-lg">{ic}</span>
            </div>
            <div className="font-display text-xl font-bold" style={{color:clr}}>{val}</div>
          </div>
        ))}
      </div>

      {/* Progress */}
      <div className={card}>
        <div className="flex justify-between mb-3">
          <span className="font-semibold text-sm">{t.progress}</span>
          <span className="text-sm text-slate-400">{paidN} {t.paidOf} {exps.length} · <strong className="text-blue-700 dark:text-blue-400">{pct}%</strong></span>
        </div>

function ExpensesView({exps,onToggle,onEdit,onDelete,onAdd,rate,t,lang,month,year}){
  const months=lang==='es'?MONTHS_ES:MONTHS_EN;
  const [view,setView]=useState('all');
  const [fCat,setFCat]=useState('all');
  const [fSt,setFSt]=useState('all');
  const [q,setQ]=useState('');

  const filtered=useMemo(()=>{
    const ql=q.toLowerCase();
    return exps.filter(e=>{
      const mC=fCat==='all'||e.cat===fCat;
      const mS=fSt==='all'||e.st===fSt;
      const mQ=e.name.toLowerCase().includes(ql)||(e.notes&&e.notes.toLowerCase().includes(ql));
      const mP=inPeriod(e,view);
      return mC&&mS&&mQ&&mP;
    });
  },[exps,fCat,fSt,q,view]);

  const grouped=useMemo(()=>{
    const g={};
    CATS.forEach(c=>{
      const items=filtered.filter(e=>e.cat===c).sort((a,b)=>a.day-b.day);
      if(items.length)g[c]=items;
    });
    return g;
  },[filtered]);

  const sel='text-sm px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-600 transition';

  return(
    <div className="space-y-5 fade-in">
      <div className="flex items-center justify-between gap-3">
        <h2 className="font-display text-2xl font-bold">{months[month]} <span className="text-slate-400 font-normal">{year}</span></h2>
        <button onClick={onAdd} className="px-4 py-2.5 bg-blue-800 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold transition shadow-sm">{t.addExp}</button>
      </div>

      {/* Period tabs */}
      <div className="flex border-b border-slate-200 dark:border-slate-800">
        {[['all',t.allMonth],['q1',t.q1],['q2',t.q2]].map(([v,lb])=>(
          <button key={v} onClick={()=>setView(v)}
            className={`px-5 py-2.5 text-sm font-semibold transition ${view===v?'tab-on':'tab-off'}`}>{lb}</button>
        ))}
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-2">
        <div className="relative flex-1 min-w-[180px]">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none">🔍</span>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder={t.search}
            className="w-full pl-9 pr-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-600 transition"/>
        </div>
        <select value={fCat} onChange={e=>setFCat(e.target.value)} className={sel}>
          <option value="all">{t.allCats}</option>
          {CATS.map(c=><option key={c} value={c}>{CAT_ICO[c]} {c}</option>)}
        </select>
        <select value={fSt} onChange={e=>setFSt(e.target.value)} className={sel}>
          <option value="all">{t.allStatus}</option>
          {STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>

      {Object.keys(grouped).length===0?(
        <div className="py-20 text-center text-slate-400 text-sm">{t.noData}</div>
      ):(
        Object.entries(grouped).map(([cat,items])=>{
          const catTotal=items.reduce((s,e)=>s+toCAD(e.amt,e.cur,rate),0);
          const catPaid=items.filter(e=>e.st==='Pagado').length;
          return(
            <div key={cat} className="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
              <div className="px-5 py-3 flex items-center gap-3" style={{backgroundColor:CAT_CLR[cat]+'18'}}>
                <span className="text-lg">{CAT_ICO[cat]}</span>
                <span className="font-display font-bold text-sm" style={{color:CAT_CLR[cat]}}>{cat}</span>
                <span className="text-xs text-slate-400">{catPaid}/{items.length} {t.items}</span>
                <span className="ml-auto font-bold text-sm" style={{color:CAT_CLR[cat]}}>{fmtC(catTotal,'CAD')}</span>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="bg-slate-50/80 dark:bg-slate-800/50 text-xs font-semibold text-slate-400 uppercase tracking-wide text-left">
                      <th className="pl-4 pr-2 py-2.5 w-8"></th>
                      <th className="px-3 py-2.5">{t.name}</th>
                      <th className="px-3 py-2.5 text-right">{t.amount}</th>
                      <th className="px-3 py-2.5 text-right hidden sm:table-cell">{t.totalOwedF}</th>
                      <th className="px-3 py-2.5 text-center hidden sm:table-cell">Día</th>
                      <th className="px-3 py-2.5 hidden lg:table-cell">{t.freq}</th>

                      <th className="px-3 py-2.5 text-center">{t.status}</th>
                      <th className="px-3 py-2.5 w-16"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {items.map(e=>(
                      <tr key={e.id} className={`group border-t border-slate-100 dark:border-slate-800 hover:bg-blue-50/30 dark:hover:bg-blue-900/10 transition-colors ${e.st==='Pagado'?'opacity-50':''}`}>
                        <td className="pl-4 pr-2 py-3 text-center">

                          <div className="text-sm font-bold whitespace-nowrap">{fmtC(e.amt,e.cur)}</div>
                          {e.cur==='MXN'&&<div className="text-xs text-slate-400">{fmtC(toCAD(e.amt,e.cur,rate),'CAD')}</div>}
                        </td>
                        <td className="px-3 py-3 text-right hidden sm:table-cell">
                          {e.owed>0?<span className="text-sm text-slate-500">{fmtC(e.owed,e.cur)}</span>:<span className="text-slate-300 dark:text-slate-600">—</span>}
                        </td>
                        <td className="px-3 py-3 text-center hidden sm:table-cell">
                          <span className="text-sm text-slate-500 font-medium">D{e.day}</span>
                        </td>
                        <td className="px-3 py-3 hidden lg:table-cell">
                          <span className="text-xs text-slate-400">{e.freq}</span>
                        </td>
                        <td className="px-3 py-3 hidden xl:table-cell">
                          <span className="text-xs text-slate-500">{e.acct}</span>
                        </td>
                        <td className="px-3 py-3 text-center">
                          <span className={`text-xs px-2.5 py-1 rounded-full font-semibold ${stCls(e.st)}`}>
                            {e.st==='Pendiente'?t.pending:e.st==='Pagado'?t.paid:t.overdue}
                          </span>
                        </td>
                        <td className="px-3 py-3">
                          <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition">
                            <button onClick={()=>onEdit(e)} className="p-1.5 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-900/40 text-blue-600 dark:text-blue-400 transition text-sm">✏</button>
                            <button onClick={()=>onDelete(e.id)} className="p-1.5 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/40 text-red-500 transition text-sm">✕</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────
function App(){
  const now=new Date();
  const [lang,setLang]=useState('es');
  const [tab,setTab]=useState('dashboard');
  const [month,setMonth]=useState(now.getMonth());
  const [year,setYear]=useState(now.getFullYear());
  const [loading,setLoading]=useState(false);
  const [syncMsg,setSyncMsg]=useState('');

  const load=(key,def)=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}catch{return def;}};

  const [exps,setExps]=useState(()=>load('xp_e',INIT));
  const [hist,setHist]=useState(()=>load('xp_h',[]));
  const [rate,setRateS]=useState(()=>parseFloat(localStorage.getItem('xp_r'))||0.073);
  const [apiUrl,setApiUrlS]=useState(()=>localStorage.getItem('xp_api')||'');

  const [showForm,setShowForm]=useState(false);
  const [editE,setEditE]=useState(null);
  const [delId,setDelId]=useState(null);

  const t=TR[lang];

  // Dark mode auto
  useEffect(()=>{
    const mq=window.matchMedia('(prefers-color-scheme: dark)');
    const apply=ev=>document.documentElement.classList.toggle('dark',ev.matches);
    apply(mq);mq.addEventListener('change',apply);
    return()=>mq.removeEventListener('change',apply);
  },[]);

  // Persist
  useEffect(()=>{try{localStorage.setItem('xp_e',JSON.stringify(exps));}catch{};},[exps]);
  useEffect(()=>{try{localStorage.setItem('xp_h',JSON.stringify(hist));}catch{};},[hist]);
  useEffect(()=>{try{localStorage.setItem('xp_r',String(rate));}catch{};},[rate]);
  useEffect(()=>{try{localStorage.setItem('xp_api',apiUrl);}catch{};},[apiUrl]);

  const pushData=useCallback(async(data)=>{
    if(!apiUrl)return;
    try{await fetch(`${apiUrl}?action=write&data=${encodeURIComponent(JSON.stringify(data))}`);}catch{}
  },[apiUrl]);

  const syncData=useCallback(async()=>{
    if(!apiUrl)return;
    setLoading(true);setSyncMsg('');
    try{
      const r=await fetch(`${apiUrl}?action=read`);
      const d=await r.json();
      if(d.expenses?.length>0){
        setExps(d.expenses.map(e=>({...e,amt:parseFloat(e.amt)||0,owed:parseFloat(e.owed)||0,day:parseInt(e.day)||1})));
        setSyncMsg(t.syncOk);
      }
    }catch{setSyncMsg(t.syncFail);}
    finally{setLoading(false);setTimeout(()=>setSyncMsg(''),3000);}
  },[apiUrl,t]);

  useEffect(()=>{if(apiUrl)syncData();},[apiUrl]);

  const upd=(next)=>{setExps(next);pushData(next);};

  const setRate=(v)=>setRateS(v);
  const setApiUrl=(v)=>setApiUrlS(v);

  const handleToggle=(id)=>upd(exps.map(e=>e.id!==id?e:{...e,st:e.st==='Pagado'?'Pendiente':'Pagado'}));
  const handleSave=(e)=>{
    const next=exps.find(x=>x.id===e.id)?exps.map(x=>x.id===e.id?e:x):[...exps,e];
    upd(next);setShowForm(false);setEditE(null);
  };
  const handleDel=(id)=>{upd(exps.filter(e=>e.id!==id));setDelId(null);};
  const handleEdit=(e)=>{setEditE(e);setShowForm(true);};

  const handleNewPeriod=()=>{
    if(!window.confirm(t.confirmPeriod))return;
    const snap={
      month,year,
      totalPaid:exps.filter(e=>e.st==='Pagado').reduce((s,e)=>s+toCAD(e.amt,e.cur,rate),0),
      items:exps.map(e=>({name:e.name,cat:e.cat,amt:e.amt,cur:e.cur,st:e.st}))
    };
    setHist(h=>[snap,...h]);
    const nm=month===11?0:month+1,ny=month===11?year+1:year;
    upd(exps.map(e=>({...e,st:'Pendiente'})));
    setMonth(nm);setYear(ny);
    if(apiUrl)try{fetch(`${apiUrl}?action=history&data=${encodeURIComponent(JSON.stringify(snap))}`);}catch{}
  };

  const TABS=[
    {id:'dashboard',lb:t.dashboard},
    {id:'expenses', lb:t.expenses},
    {id:'history',  lb:t.history},
    {id:'setup',    lb:'⚙'},
  ];
  const months=lang==='es'?MONTHS_ES:MONTHS_EN;

  return(
    <div className="min-h-screen bg-slate-50 dark:bg-slate-950">
      {/* HEADER */}
      <header className="sticky top-0 z-40 shadow-lg" style={{background:'linear-gradient(135deg,#0f172a 0%,#1e3a6e 55%,#1d4ed8 100%)'}}>
        <div className="max-w-7xl mx-auto px-4">
          <div className="flex items-center justify-between py-3 gap-3">
            <div className="flex items-center gap-2.5 flex-shrink-0">
              <div className="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center">💰</div>
              <span className="font-display font-bold text-white text-lg hidden sm:block">{t.appTitle}</span>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <select value={month} onChange={e=>setMonth(parseInt(e.target.value))}
                className="text-sm bg-white/10 border border-white/20 text-white rounded-xl px-3 py-1.5 cursor-pointer focus:outline-none">
                {months.map((m,i)=><option key={i} value={i} className="text-slate-900 bg-white">{m}</option>)}
              </select>
              <select value={year} onChange={e=>setYear(parseInt(e.target.value))}
                className="text-sm bg-white/10 border border-white/20 text-white rounded-xl px-2 py-1.5 w-20 cursor-pointer focus:outline-none">
                {[2024,2025,2026,2027].map(y=><option key={y} className="text-slate-900 bg-white">{y}</option>)}
              </select>
              <button onClick={handleNewPeriod} className="hidden sm:block px-3 py-1.5 bg-white/10 hover:bg-white/20 border border-white/20 text-white rounded-xl text-sm font-semibold transition">
                {t.newPeriod}
              </button>
              <button onClick={()=>setLang(l=>l==='es'?'en':'es')}
                className="px-3 py-1.5 bg-white/10 hover:bg-white/20 border border-white/20 text-white rounded-xl text-xs font-bold transition">
                {lang==='es'?'EN':'ES'}
              </button>
            </div>
          </div>
          <div className="flex gap-1 overflow-x-auto" style={{scrollbarWidth:'none'}}>
            {TABS.map(({id,lb})=>(
              <button key={id} onClick={()=>setTab(id)}
                className={`px-5 py-2.5 text-sm font-semibold whitespace-nowrap transition ${tab===id?'tab-on':'tab-off'}`}>{lb}</button>
            ))}
            {loading&&<span className="self-center ml-2 text-xs text-blue-300 animate-pulse">⟳ Sync...</span>}
          </div>
        </div>
      </header>

      {/* CONTENT */}
      <main className="max-w-7xl mx-auto px-4 py-6">
        {tab==='dashboard'&&<Dashboard exps={exps} rate={rate} t={t} lang={lang} month={month} year={year}
          setRate={setRate} apiUrl={apiUrl} setApiUrl={setApiUrl} onSync={syncData} loading={loading} syncMsg={syncMsg}/>}
        {tab==='expenses'&&<ExpensesView exps={exps} onToggle={handleToggle} onEdit={handleEdit}
          onDelete={setDelId} onAdd={()=>{setEditE(null);setShowForm(true);}} rate={rate} t={t} lang={lang} month={month} year={year}/>}
        {tab==='history'&&<HistoryView hist={hist} t={t} lang={lang}/>}
        {tab==='setup'&&<SetupGuide t={t}/>}
      </main>

      {showForm&&(
        <Modal title={editE?t.editExp:t.addExp} onClose={()=>{setShowForm(false);setEditE(null);}}>
          <ExpForm init={editE} onSave={handleSave} onCancel={()=>{setShowForm(false);setEditE(null);}} t={t}/>
        </Modal>
      )}

      {delId&&(
        <Modal title={t.deleteQ} onClose={()=>setDelId(null)}>
          <div className="space-y-4">
            <p className="text-sm text-slate-500">{t.deleteQ}</p>
            <div className="flex gap-3">
              <button onClick={()=>handleDel(delId)} className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl text-sm font-semibold transition">{t.deleteBtn}</button>
              <button onClick={()=>setDelId(null)} className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-xl text-sm font-semibold transition">{t.cancel}</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
