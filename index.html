const fmtCAD = (n) => {
  const abs = Math.abs(Number(n));
  return `C$${abs.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}`;
};
const fmtMXN = (n) => {
  const abs = Math.abs(Number(n));
  return `$${abs.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')} MXN`;
};
const fmtAmt = (amount, currency) => currency === 'MXN' ? fmtMXN(amount) : fmtCAD(amount);
const toCAD  = (amount, currency, rate) => currency === 'MXN' ? Number(amount) * rate : Number(amount);
const genId  = () => 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);

const statusStyle = (s) => {
  if (s === 'Pagado')  return 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300';
  if (s === 'Vencido') return 'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300';
  return 'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300';
};

const inPeriod = (exp, view) => {
  if (view === 'all') return true;
  const bw = exp.frequency === 'Biweekly';
  if (view === 'q1') return exp.payDay <= 15 || bw;
  if (view === 'q2') return exp.payDay > 15 || bw;
  return true;
};

const APPS_SCRIPT_CODE = `// ══════════════════════════════════════════
// EXPENSE TRACKER — Google Apps Script
// Pega este código en tu Apps Script
// ══════════════════════════════════════════
const SHEET_NAME = 'Gastos';
const HISTORY_SHEET = 'Historial';

function doGet(e) {
  const action = e.parameter.action || 'read';
  const ss = SpreadsheetApp.getActiveSpreadsheet();

  if (action === 'read') {
    const sheet = ss.getSheetByName(SHEET_NAME) || ss.insertSheet(SHEET_NAME);
    const rows = sheet.getDataRange().getValues();
    if (rows.length < 2) return ok({ expenses: [] });
    const headers = rows[0];
    const expenses = rows.slice(1).map(r => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = r[i]);
      return obj;
    });
    return ok({ expenses });
  }

  if (action === 'write') {
    const raw = e.parameter.data;
    if (!raw) return ok({ written: 0 });
    const data = JSON.parse(decodeURIComponent(raw));
    writeSheet(ss, SHEET_NAME, data);
    return ok({ written: data.length });
  }

  if (action === 'saveHistory') {
    const raw = e.parameter.data;
    if (!raw) return ok({});
    const entry = JSON.parse(decodeURIComponent(raw));
    const sheet = ss.getSheetByName(HISTORY_SHEET) || ss.insertSheet(HISTORY_SHEET);
    if (sheet.getLastRow() === 0) {
      sheet.appendRow(['month','year','totalPaid','itemCount','snapshot']);
    }
    sheet.appendRow([entry.month, entry.year, entry.totalPaid, entry.items.length, JSON.stringify(entry.items)]);
    return ok({});
  }

  return ok({ error: 'unknown action' });
}

function writeSheet(ss, name, data) {
  if (!data || !data.length) return;
  const sheet = ss.getSheetByName(name) || ss.insertSheet(name);
  sheet.clearContents();
  sheet.appendRow(Object.keys(data[0]));
  data.forEach(row => sheet.appendRow(Object.values(row)));
}

function ok(data) {
  return ContentService
    .createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}`;

function Modal({ title, onClose, children, wide }) {
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm fade-in">
      <div className={`bg-white dark:bg-slate-900 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 w-full ${wide ? 'max-w-2xl' : 'max-w-lg'} max-h-[92vh] flex flex-col`}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex-shrink-0">
          <h2 className="font-display text-lg font-bold text-slate-800 dark:text-slate-100">{title}</h2>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition text-xl">&times;</button>
        </div>
        <div className="p-6 overflow-y-auto flex-1">{children}</div>
      </div>
    </div>
  );
}

function ExpenseForm({ initial, onSave, onCancel, t }) {
  const blank = { name:'', category:'Vivienda', amount:'', currency:'CAD', frequency:'Mensual', payDay:'1', totalOwed:'', status:'Pendiente', account:'TD Chequing', notes:'' };
  const [form, setForm] = useState(initial ? { ...initial, amount: initial.amount, totalOwed: initial.totalOwed, payDay: initial.payDay } : blank);
  const [err, setErr] = useState('');

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSave = () => {
    if (!form.name.trim()) { setErr(t.nameRequired); return; }
    onSave({
      ...form,
      id: form.id || genId(),
      amount:    parseFloat(form.amount)    || 0,
      totalOwed: parseFloat(form.totalOwed) || 0,
      payDay:    parseInt(form.payDay)       || 1,
    });
  };

  const inp = 'w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-slate-100 text-sm ring-focus transition';
  const lbl = 'block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wide';

  return (
    <div className="space-y-4">
      {err && <div className="text-red-500 text-sm bg-red-50 dark:bg-red-900/30 px-3 py-2 rounded-lg">{err}</div>}

      <div>
        <label className={lbl}>{t.name} *</label>
        <input className={inp} value={form.name} onChange={e => { setErr(''); set('name', e.target.value); }} />
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className={lbl}>{t.category}</label>
          <select className={inp} value={form.category} onChange={e => set('category', e.target.value)}>
            {CATEGORIES.map(c => <option key={c} value={c}>{CAT_ICONS[c]} {c}</option>)}
          </select>
        </div>
        <div>
          <label className={lbl}>{t.currency}</label>
          <select className={inp} value={form.currency} onChange={e => set('currency', e.target.value)}>
            {CURRENCIES.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className={lbl}>{t.amount}</label>
          <input type="number" step="0.01" min="0" className={inp} value={form.amount} onChange={e => set('amount', e.target.value)} />
        </div>
        <div>
          <label className={lbl}>{t.totalOwedField}</label>
          <input type="number" step="0.01" min="0" className={inp} value={form.totalOwed} onChange={e => set('totalOwed', e.target.value)} />
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className={lbl}>{t.payDay}</label>
          <input type="number" min="1" max="31" className={inp} value={form.payDay} onChange={e => set('payDay', e.target.value)} />
        </div>
        <div>
          <label className={lbl}>{t.frequency}</label>
          <select className={inp} value={form.frequency} onChange={e => set('frequency', e.target.value)}>
            {FREQUENCIES.map(f => <option key={f}>{f}</option>)}
          </select>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className={lbl}>{t.statusLabel}</label>
          <select className={inp} value={form.status} onChange={e => set('status', e.target.value)}>
            {STATUSES.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div>
          <label className={lbl}>{t.accountLabel}</label>
          <select className={inp} value={form.account} onChange={e => set('account', e.target.value)}>
            {ACCOUNTS.map(a => <option key={a}>{a}</option>)}
          </select>
        </div>
      </div>

      <div>
        <label className={lbl}>{t.notesLabel}</label>
        <input className={inp} value={form.notes} onChange={e => set('notes', e.target.value)} />
      </div>

      <div className="flex gap-3 pt-2">
        <button onClick={handleSave} className="flex-1 py-2.5 bg-blue-800 hover:bg-blue-700 text-white rounded-xl font-semibold text-sm transition shadow-sm">
          {t.save}
        </button>
        <button onClick={onCancel} className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-xl font-semibold text-sm transition">
          {t.cancel}
        </button>
      </div>
    </div>
  );
}

function ExpenseRow({ exp, onToggle, onEdit, onDelete, rate, t }) {
  const isPaid = exp.status === 'Pagado';
  const cadVal = toCAD(exp.amount, exp.currency, rate);

  return (
    <tr className={`group border-b border-slate-100 dark:border-slate-800 hover:bg-blue-50/40 dark:hover:bg-blue-900/10 transition-colors ${isPaid ? 'opacity-55' : ''}`}>
      <td className="pl-4 pr-2 py-3 text-center">
        <input
          type="checkbox"
          checked={isPaid}
          onChange={() => onToggle(exp.id)}
          className="w-4 h-4 cursor-pointer accent-blue-700"
        />
      </td>
      <td className="px-3 py-3">
        <div className="font-semibold text-sm text-slate-800 dark:text-slate-100">{exp.name}</div>
        {exp.notes && <div className="text-xs text-slate-400 mt-0.5 italic">{exp.notes}</div>}
      </td>
      <td className="px-3 py-3 hidden md:table-cell">
        <span className="inline-flex items-center gap-1 text-xs px-2 py-1 rounded-full font-medium" style={{ backgroundColor: CAT_COLORS[exp.category] + '1a', color: CAT_COLORS[exp.category] }}>
          {CAT_ICONS[exp.category]} {exp.category}
        </span>
      </td>
      <td className="px-3 py-3 text-right">
        <div className="text-sm font-bold text-slate-800 dark:text-slate-100 whitespace-nowrap">{fmtAmt(exp.amount, exp.currency)}</div>
        {exp.currency === 'MXN' && <div className="text-xs text-slate-400">{fmtCAD(cadVal)}</div>}
      </td>
      <td className="px-3 py-3 text-right hidden sm:table-cell">
        <span className="text-sm text-slate-600 dark:text-slate-300">
          {exp.totalOwed > 0 ? fmtAmt(exp.totalOwed, exp.currency) : <span className="text-slate-300 dark:text-slate-600">—</span>}
        </span>
      </td>
      <td className="px-3 py-3 text-center hidden sm:table-cell">
        <span className="text-sm text-slate-500 dark:text-slate-400 font-medium">D{exp.payDay}</span>
      </td>
      <td className="px-3 py-3 hidden lg:table-cell">
        <span className="text-xs text-slate-400">{exp.frequency}</span>
      </td>
      <td className="px-3 py-3 hidden xl:table-cell">
        <span className="text-xs text-slate-500 dark:text-slate-400">{exp.account}</span>
      </td>
      <td className="px-3 py-3 text-center">
        <span className={`text-xs px-2.5 py-1 rounded-full font-semibold ${statusStyle(exp.status)}`}>
          {exp.status === 'Pendiente' ? t.pending : exp.status === 'Pagado' ? t.paid : t.overdue}
        </span>
      </td>
      <td className="px-3 py-3 text-center">
        <div className="flex items-center justify-center gap-1 opacity-0 group-hover:opacity-100 transition">
          <button onClick={() => onEdit(exp)} className="p-1.5 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-900/50 text-blue-600 dark:text-blue-400 transition" title={t.edit}>✏</button>
          <button onClick={() => onDelete(exp.id)} className="p-1.5 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/50 text-red-500 dark:text-red-400 transition" title={t.deleteBtn}>✕</button>
        </div>
      </td>
    </tr>
  );
}

// ═══════════════════════════════════════════════════════════
//  EXPENSES VIEW
// ═══════════════════════════════════════════════════════════

function ExpensesView({ expenses, onToggle, onEdit, onDelete, onAdd, rate, t, lang, month, year }) {
  const [view, setView]             = useState('all');
  const [filterCat, setFilterCat]   = useState('all');
  const [filterSt, setFilterSt]     = useState('all');
  const [search, setSearch]         = useState('');
  const months                      = MONTHS[lang];

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return expenses.filter(e => {
      const matchCat  = filterCat === 'all' || e.category === filterCat;
      const matchSt   = filterSt  === 'all' || e.status   === filterSt;
      const matchQ    = e.name.toLowerCase().includes(q) || (e.notes && e.notes.toLowerCase().includes(q));
      const matchP    = inPeriod(e, view);
      return matchCat && matchSt && matchQ && matchP;
    });
  }, [expenses, filterCat, filterSt, search, view]);

  const grouped = useMemo(() => {
    const g = {};
    CATEGORIES.forEach(cat => {
      const items = filtered.filter(e => e.category === cat);
      if (items.length) g[cat] = items.sort((a,b) => a.payDay - b.payDay);
    });
    return g;
  }, [filtered]);

  const sel = 'text-sm px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 ring-focus transition';

  return (
    <div className="space-y-5 fade-in">
      {/* Header */}
      <div className="flex items-center justify-between gap-3">
        <h2 className="font-display text-2xl font-bold text-slate-900 dark:text-slate-100">
          {months[month]} <span className="text-slate-400 font-normal">{year}</span>
        </h2>
        <button onClick={onAdd}
          className="px-4 py-2.5 bg-blue-800 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold transition shadow-sm">
          {t.addExpense}
        </button>
      </div>

      {/* Period tabs */}
      <div className="flex gap-0 border-b border-slate-200 dark:border-slate-800">
        {[['all', t.allMonth], ['q1', t.q1], ['q2', t.q2]].map(([v, label]) => (
          <button key={v} onClick={() => setView(v)}
            className={`px-5 py-2.5 text-sm font-semibold transition ${view === v ? 'tab-active text-blue-700 dark:text-blue-400' : 'tab-inactive text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'}`}>
            {label}
          </button>
        ))}
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-2">
        <div className="relative flex-1 min-w-[200px]">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder={t.search}
            className="w-full pl-9 pr-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm text-slate-700 dark:text-slate-200 ring-focus transition" />
        </div>
        <select value={filterCat} onChange={e => setFilterCat(e.target.value)} className={sel}>
          <option value="all">{t.allCats}</option>
          {CATEGORIES.map(c => <option key={c} value={c}>{CAT_ICONS[c]} {c}</option>)}
        </select>
        <select value={filterSt} onChange={e => setFilterSt(e.target.value)} className={sel}>
          <option value="all">{t.allStatus}</option>
          {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
      </div>

      {/* Grouped tables */}
      {Object.keys(grouped).length === 0 ? (
        <div className="py-20 text-center text-slate-400 dark:text-slate-500 text-sm">{t.noData}</div>
      ) : (
        Object.entries(grouped).map(([cat, items]) => {
          const catTotal = items.reduce((s,e) => s + toCAD(e.amount, e.currency, rate), 0);
          const catPaid  = items.filter(e => e.status === 'Pagado').length;
          return (
            <div key={cat} className="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
              {/* Category header */}
              <div className="px-5 py-3 flex items-center gap-3" style={{ backgroundColor: CAT_COLORS[cat] + '12' }}>
                <span className="text-lg">{CAT_ICONS[cat]}</span>
                <span className="font-display font-bold text-sm" style={{ color: CAT_COLORS[cat] }}>{cat}</span>
                <span className="text-xs text-slate-400 dark:text-slate-500">{catPaid}/{items.length} {t.items}</span>
                <div className="ml-auto flex items-center gap-3">
                  <span className="text-sm font-bold" style={{ color: CAT_COLORS[cat] }}>{fmtCAD(catTotal)}</span>
                </div>
              </div>
              {/* Table */}
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead>
                    <tr className="text-left bg-slate-50/80 dark:bg-slate-800/60 text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                      <th className="pl-4 pr-2 py-2.5 w-8"></th>
                      <th className="px-3 py-2.5">{t.name}</th>
                      <th className="px-3 py-2.5 hidden md:table-cell">{t.category}</th>
                      <th className="px-3 py-2.5 text-right">{t.amount}</th>
                      <th className="px-3 py-2.5 text-right hidden sm:table-cell">{t.totalOwed}</th>
                      <th className="px-3 py-2.5 text-center hidden sm:table-cell">{t.payDay}</th>
                      <th className="px-3 py-2.5 hidden lg:table-cell">{t.frequency}</th>
                      <th className="px-3 py-2.5 hidden xl:table-cell">{t.account}</th>
                      <th className="px-3 py-2.5 text-center">{t.status}</th>
                      <th className="px-3 py-2.5 text-center">{t.actions}</th>
                    </tr>
                  </thead>
                  <tbody>
                    {items.map(exp => (
                      <ExpenseRow key={exp.id} exp={exp} onToggle={onToggle} onEdit={onEdit} onDelete={onDelete} rate={rate} t={t} />
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════

function Dashboard({ expenses, rate, t, lang, month, year, onRateChange, apiUrl, onApiUrlChange, onSync, loading, syncMsg }) {
  const months   = MONTHS[lang];
  const today    = new Date().getDate();
  const [rateIn, setRateIn]   = useState(rate);
  const [apiIn,  setApiIn]    = useState(apiUrl);
  const [showApi, setShowApi] = useState(false);

  useEffect(() => { setRateIn(rate); }, [rate]);
  useEffect(() => { setApiIn(apiUrl); }, [apiUrl]);

  const totalCAD  = expenses.reduce((s,e) => s + toCAD(e.amount, e.currency, rate), 0);
  const paidCAD   = expenses.filter(e => e.status === 'Pagado').reduce((s,e) => s + toCAD(e.amount, e.currency, rate), 0);
  const pendCAD   = totalCAD - paidCAD;
  const owedCAD   = expenses.reduce((s,e) => s + toCAD(e.totalOwed, e.currency, rate), 0);
  const paidCount = expenses.filter(e => e.status === 'Pagado').length;
  const progress  = expenses.length ? Math.round(paidCount / expenses.length * 100) : 0;

  const alerts = expenses.filter(e => {
    const d = e.payDay - today;
    return d >= 0 && d <= 3 && e.status !== 'Pagado';
  }).sort((a,b) => a.payDay - b.payDay);

  const chartData = CATEGORIES.map(cat => ({
    name: cat,
    value: parseFloat(expenses.filter(e => e.category === cat).reduce((s,e) => s + toCAD(e.amount, e.currency, rate), 0).toFixed(2)),
  })).filter(d => d.value > 0);

  const card = 'bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-5 shadow-sm';

  return (
    <div className="space-y-5 fade-in">
      <div className="flex items-center justify-between">
        <h2 className="font-display text-2xl font-bold text-slate-900 dark:text-slate-100">
          {months[month]} <span className="text-slate-400 font-normal">{year}</span>
        </h2>
        {!apiUrl && (
          <span className="text-xs bg-amber-50 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 border border-amber-200 dark:border-amber-700/50 px-3 py-1.5 rounded-full">
            {t.demoMode}
          </span>
        )}
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-3">
        {[
          { label: t.totalOwed, value: fmtCAD(owedCAD),  color: '#dc2626', icon: '💸' },
          { label: t.toPay,     value: fmtCAD(totalCAD), color: '#1d4ed8', icon: '📋' },
          { label: t.paid,      value: fmtCAD(paidCAD),  color: '#059669', icon: '✅' },
          { label: t.pending,   value: fmtCAD(pendCAD),  color: '#d97706', icon: '⏳' },
        ].map(({ label, value, color, icon }) => (
          <div key={label} className={`${card} border-l-4`} style={{ borderLeftColor: color }}>
            <div className="flex items-start justify-between mb-3">
              <span className="text-xs font-semibold text-slate-400 uppercase tracking-wide">{label}</span>
              <span className="text-lg">{icon}</span>
            </div>
            <div className="font-display text-2xl font-bold" style={{ color }}>{value}</div>
          </div>
        ))}
      </div>

      {/* Progress */}
      <div className={card}>
        <div className="flex justify-between items-center mb-3">
          <span className="font-semibold text-sm text-slate-700 dark:text-slate-200">{t.progress}</span>
          <span className="text-sm text-slate-500 dark:text-slate-400">
            {paidCount} {t.paidOf} {expenses.length} · <span className="font-bold text-blue-700 dark:text-blue-400">{progress}%</span>
          </span>
        </div>
        <div className="h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
          <div className="h-full rounded-full transition-all duration-700 ease-out"
            style={{ width: `${progress}%`, background: 'linear-gradient(90deg, #1e40af, #3b82f6)' }}>
          </div>
        </div>
        {progress === 100 && (
          <div className="mt-2 text-sm text-emerald-600 dark:text-emerald-400 font-semibold">{t.allPaid}</div>
        )}
      </div>

      {/* Alerts */}
      {alerts.length > 0 && (
        <div className={`${card} border-amber-200 dark:border-amber-800/60`} style={{ background: 'linear-gradient(135deg, #fffbeb, #fef3c7)' }}>
          <div className="font-display font-bold text-amber-800 dark:text-amber-400 text-sm mb-3">⚠ {t.alerts}</div>
          <div className="space-y-2">
            {alerts.map(e => {
              const diff = e.payDay - today;
              const lbl = diff === 0 ? t.dueToday : diff === 1 ? t.dueTomorrow : `${t.dueIn} ${diff} ${t.days}`;
              return (
                <div key={e.id} className="flex justify-between items-center">
                  <span className="text-sm font-medium text-amber-900">{e.name}</span>
                  <div className="flex items-center gap-3">
                    <span className="text-sm font-bold text-amber-800">{fmtAmt(e.amount, e.currency)}</span>
                    <span className="text-xs bg-amber-800 text-amber-50 px-2.5 py-0.5 rounded-full font-semibold">{lbl}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Charts and settings row */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        {/* Pie chart */}
        <div className={card}>
          <div className="font-semibold text-sm text-slate-700 dark:text-slate-200 mb-4">{t.byCategory}</div>
          {chartData.length > 0 ? (
            <ResponsiveContainer width="100%" height={240}>
              <PieChart>
                <Pie data={chartData} cx="50%" cy="50%" innerRadius={60} outerRadius={95} dataKey="value" paddingAngle={2}>
                  {chartData.map((entry, i) => (
                    <Cell key={i} fill={CAT_COLORS[entry.name] || '#64748b'} stroke="none" />
                  ))}
                </Pie>
                <Tooltip formatter={(v) => [fmtCAD(v), '']} contentStyle={{ fontSize: 12, borderRadius: 8 }} />
                <Legend iconType="circle" iconSize={8} wrapperStyle={{ fontSize: 11 }} />
              </PieChart>
            </ResponsiveContainer>
          ) : (
            <div className="h-40 flex items-center justify-center text-slate-400 text-sm">{t.noData}</div>
          )}
        </div>

        {/* Exchange rate + API config */}
        <div className={`${card} space-y-5`}>
          {/* Exchange rate */}
          <div>
            <label className="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-2">{t.exchangeRate}</label>
            <div className="flex gap-2">
              <input type="number" step="0.0001" min="0" value={rateIn}
                onChange={e => setRateIn(e.target.value)}
                className="flex-1 px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm text-slate-800 dark:text-slate-100 ring-focus transition" />
              <button onClick={() => onRateChange(parseFloat(rateIn) || rate)}
                className="px-4 py-2.5 bg-blue-800 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold transition">
                {t.update}
              </button>
            </div>
            <div className="text-xs text-slate-400 mt-1.5">1 MXN = {Number(rate).toFixed(4)} CAD</div>
          </div>

          {/* Category breakdown text */}
          <div>
            <div className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-2">{t.byCategory}</div>
            <div className="space-y-1.5 max-h-48 overflow-y-auto pr-1">
              {CATEGORIES.map(cat => {
                const v = expenses.filter(e => e.category === cat).reduce((s,e) => s + toCAD(e.amount, e.currency, rate), 0);
                if (v === 0) return null;
                const pct = totalCAD > 0 ? Math.round(v / totalCAD * 100) : 0;
                return (
                  <div key={cat} className="flex items-center gap-2">
                    <span className="text-sm">{CAT_ICONS[cat]}</span>
                    <div className="flex-1 min-w-0">
                      <div className="flex justify-between text-xs mb-0.5">
                        <span className="text-slate-600 dark:text-slate-300 truncate font-medium">{cat}</span>
                        <span className="text-slate-400 ml-2 flex-shrink-0">{fmtCAD(v)}</span>
                      </div>
                      <div className="h-1.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                        <div className="h-full rounded-full" style={{ width:`${pct}%`, backgroundColor: CAT_COLORS[cat] }}></div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* API config toggle */}
          <div className="border-t border-slate-100 dark:border-slate-800 pt-4">
            <button onClick={() => setShowApi(!showApi)} className="text-xs font-semibold text-blue-700 dark:text-blue-400 hover:underline flex items-center gap-1">
              🔗 {t.apiConfig} {showApi ? '▲' : '▼'}
            </button>
            {showApi && (
              <div className="mt-3 space-y-2">
                <input placeholder={t.apiUrl} value={apiIn} onChange={e => setApiIn(e.target.value)}
                  className="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm text-slate-800 dark:text-slate-100 ring-focus transition" />
                <div className="flex gap-2">
                  <button onClick={() => onApiUrlChange(apiIn)}
                    className="flex-1 py-2 bg-blue-800 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold transition">
                    {t.apiSave}
                  </button>
                  <button onClick={onSync} disabled={loading}
                    className="flex-1 py-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-xl text-sm font-semibold transition disabled:opacity-50">
                    {loading ? '⟳' : t.apiSync}
                  </button>
                </div>
                {syncMsg && <div className="text-xs text-center text-slate-500 dark:text-slate-400">{syncMsg}</div>}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

    <div className="space-y-4 fade-in">

              <div className="font-display text-xl font-bold text-emerald-600 dark:text-emerald-400">{fmtCAD(h.totalPaid || 0)}</div>

                    {h.items.map((item, j) => (

                        <td className="py-2 text-right font-bold text-slate-700 dark:text-slate-200">{fmtAmt(item.amount, item.currency)}</td>
                        <td className="py-2 text-right">
                          <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${statusStyle(item.status)}`}>{item.status}</span>

                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function SetupGuide({ t }) {
  const [copied, setCopied] = useState(false);
  const copyCode = () => {
    navigator.clipboard.writeText(APPS_SCRIPT_CODE).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  return (
    <div className="space-y-5 fade-in max-w-3xl">
      <h2 className="font-display text-2xl font-bold text-slate-900 dark:text-slate-100">⚙ {t.apiConfig}</h2>

      <div className="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 space-y-5 shadow-sm">
        <div>
          <div className="font-display font-bold text-slate-800 dark:text-slate-100 mb-1">{t.instructions}</div>
          <div className="text-sm text-slate-500 dark:text-slate-400 mb-4">Sigue estos pasos para conectar tu Google Sheet y compartir datos entre dispositivos.</div>
          <ol className="space-y-3 text-sm text-slate-700 dark:text-slate-300">
            {[
              <>Ve a <a href="https://sheets.google.com" target="_blank" className="text-blue-600 dark:text-blue-400 underline font-medium">sheets.google.com</a> y crea una hoja nueva.</>,
              <>Menú: <strong>Extensiones → Apps Script</strong>.</>,
              <>Borra el código existente y pega el código de abajo.</>,
              <>Haz clic en <strong>Implementar → Nueva implementación</strong>.</>,
              <>Tipo: <strong>Aplicación web</strong> · Ejecutar como: <strong>Yo</strong> · Acceso: <strong>Cualquier persona</strong>.</>,
              <>Autoriza los permisos solicitados.</>,
              <>Copia la <strong>URL de implementación</strong> generada.</>,
              <>Pégala en <strong>Dashboard → Configurar Google Sheets API</strong> y haz clic en <em>Guardar URL</em>.</>,
            ].map((step, i) => (
              <li key={i} className="flex gap-3">
                <span className="flex-shrink-0 w-6 h-6 rounded-full bg-blue-800 text-white text-xs flex items-center justify-center font-bold mt-0.5">{i+1}</span>
                <span>{step}</span>
              </li>
            ))}
          </ol>
        </div>

        <div>
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-bold text-slate-400 uppercase tracking-wide">Google Apps Script (Code.gs)</span>
            <button onClick={copyCode} className="text-xs px-3 py-1.5 bg-blue-800 hover:bg-blue-700 text-white rounded-lg font-semibold transition">
              {copied ? '✓ Copiado' : '📋 Copiar código'}
            </button>
          </div>
          <pre className="bg-slate-950 text-emerald-400 text-xs p-4 rounded-xl overflow-x-auto whitespace-pre font-mono leading-relaxed max-h-72">{APPS_SCRIPT_CODE}</pre>
        </div>

        <div className="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/50 rounded-xl p-4 text-sm text-amber-800 dark:text-amber-300">
          <strong>💡 Nota:</strong> Cuando compartas la URL de la página HTML con otra persona, ambas verán y editarán los mismos datos desde Google Sheets. El primer <em>Sincronizar</em> cargará todos los datos registrados.
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  APP (MAIN)
// ═══════════════════════════════════════════════════════════

function App() {
  const now = new Date();

  const [lang, setLang]     = useState('es');
  const [tab, setTab]       = useState('dashboard');
  const [month, setMonth]   = useState(now.getMonth());
  const [year, setYear]     = useState(now.getFullYear());
  const [loading, setLoading] = useState(false);
  const [syncMsg, setSyncMsg] = useState('');

  const [expenses, setExpenses] = useState(() => {
    try { const s = localStorage.getItem('xp_expenses'); return s ? JSON.parse(s) : INITIAL_EXPENSES; }
    catch { return INITIAL_EXPENSES; }
  });
  const [history, setHistory] = useState(() => {
    try { const s = localStorage.getItem('xp_history'); return s ? JSON.parse(s) : []; }
    catch { return []; }
  });
  const [rate, setRate]     = useState(() => parseFloat(localStorage.getItem('xp_rate')) || 0.073);
  const [apiUrl, setApiUrl] = useState(() => localStorage.getItem('xp_api') || '');

  const [showModal, setShowModal]   = useState(false);
  const [editExp,   setEditExp]     = useState(null);
  const [deleteId,  setDeleteId]    = useState(null);

  const t = T[lang];

  // Dark mode (auto from system)
  useEffect(() => {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const apply = (ev) => document.documentElement.classList.toggle('dark', ev.matches);
    apply(mq);
    mq.addEventListener('change', apply);
    return () => mq.removeEventListener('change', apply);
  }, []);

  // Persist
  useEffect(() => { try { localStorage.setItem('xp_expenses', JSON.stringify(expenses)); } catch {} }, [expenses]);
  useEffect(() => { try { localStorage.setItem('xp_history',  JSON.stringify(history));  } catch {} }, [history]);
  useEffect(() => { try { localStorage.setItem('xp_rate', String(rate));    } catch {} }, [rate]);
  useEffect(() => { try { localStorage.setItem('xp_api',  apiUrl);          } catch {} }, [apiUrl]);

  // Sync read from Google Sheets
  const syncData = useCallback(async () => {
    if (!apiUrl) return;
    setLoading(true);
    setSyncMsg('');
    try {
      const res  = await fetch(`${apiUrl}?action=read`);
      const data = await res.json();
      if (data.expenses && Array.isArray(data.expenses) && data.expenses.length > 0) {
        setExpenses(data.expenses.map(e => ({
          ...e,
          amount:    parseFloat(e.amount)    || 0,
          totalOwed: parseFloat(e.totalOwed) || 0,
          payDay:    parseInt(e.payDay)       || 1,
        })));
        setSyncMsg(t.syncOk);
      }
    } catch {
      setSyncMsg(t.syncFail);
    } finally {
      setLoading(false);
      setTimeout(() => setSyncMsg(''), 3000);
    }
  }, [apiUrl, t]);

  // Push write to Google Sheets
  const pushData = useCallback(async (data) => {
    if (!apiUrl) return;
    try {
      const encoded = encodeURIComponent(JSON.stringify(data));
      await fetch(`${apiUrl}?action=write&data=${encoded}`);
    } catch {}
  }, [apiUrl]);

  // Auto-sync on apiUrl set
  useEffect(() => {
    if (apiUrl) syncData();
  }, [apiUrl]);

  const updateExpenses = (next) => {
    setExpenses(next);
    pushData(next);
  };

  // Handlers
  const handleToggle = (id) => {
    updateExpenses(expenses.map(e => e.id !== id ? e : { ...e, status: e.status === 'Pagado' ? 'Pendiente' : 'Pagado' }));
  };

  const handleSave = (exp) => {
    const next = expenses.find(e => e.id === exp.id)
      ? expenses.map(e => e.id === exp.id ? exp : e)
      : [...expenses, exp];
    updateExpenses(next);
    setShowModal(false);
    setEditExp(null);
  };

  const handleDelete = (id) => {
    updateExpenses(expenses.filter(e => e.id !== id));
    setDeleteId(null);
  };

  const handleEdit = (exp) => { setEditExp(exp); setShowModal(true); };

  const handleNewPeriod = () => {
    if (!window.confirm(t.confirmNewPeriod)) return;
    const snapshot = {
      month, year,
      totalPaid: expenses.filter(e => e.status === 'Pagado').reduce((s,e) => s + toCAD(e.amount, e.currency, rate), 0),
      items: expenses.map(e => ({ name:e.name, category:e.category, amount:e.amount, currency:e.currency, status:e.status })),
    };
    setHistory(h => [snapshot, ...h]);
    const nm = month === 11 ? 0 : month + 1;
    const ny = month === 11 ? year + 1 : year;
    updateExpenses(expenses.map(e => ({ ...e, status:'Pendiente' })));
    setMonth(nm);
    setYear(ny);
    // Save history to sheets
    if (apiUrl) {
      try { fetch(`${apiUrl}?action=saveHistory&data=${encodeURIComponent(JSON.stringify(snapshot))}`); } catch {}
    }
  };

  const TABS = [
    { id:'dashboard', label: t.dashboard  },
    { id:'expenses',  label: t.expenses   },
    { id:'history',   label: t.history    },
    { id:'setup',     label: '⚙'          },
  ];

  const months = MONTHS[lang];

  return (
    <div className="min-h-screen bg-slate-50 dark:bg-slate-950">
      {/* ─── HEADER ─── */}
      <header className="sticky top-0 z-40 shadow-xl" style={{ background: 'linear-gradient(135deg, #0f172a 0%, #1e3a6e 60%, #1d4ed8 100%)' }}>
        <div className="max-w-7xl mx-auto px-4">
          <div className="flex items-center justify-between py-3 gap-3">
            {/* Logo */}
            <div className="flex items-center gap-2.5 flex-shrink-0">
              <div className="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center text-lg">💰</div>
              <span className="font-display font-bold text-white text-lg hidden sm:block tracking-tight">{t.appTitle}</span>
            </div>

            {/* Period selector */}
            <div className="flex items-center gap-2">
              <select value={month} onChange={e => setMonth(parseInt(e.target.value))}
                className="text-sm bg-white/10 border border-white/20 text-white rounded-xl px-3 py-1.5 ring-focus backdrop-blur-sm cursor-pointer">
                {months.map((m, i) => <option key={i} value={i} className="text-slate-900 bg-white">{m}</option>)}
              </select>
              <select value={year} onChange={e => setYear(parseInt(e.target.value))}
                className="text-sm bg-white/10 border border-white/20 text-white rounded-xl px-2 py-1.5 w-20 ring-focus backdrop-blur-sm cursor-pointer">
                {[2024,2025,2026,2027].map(y => <option key={y} className="text-slate-900 bg-white">{y}</option>)}
              </select>
              <button onClick={handleNewPeriod}
                className="hidden sm:block px-3 py-1.5 bg-white/10 hover:bg-white/20 border border-white/20 text-white rounded-xl text-sm font-semibold transition backdrop-blur-sm">
                {t.newPeriod}
              </button>
              <button onClick={() => setLang(l => l === 'es' ? 'en' : 'es')}
                className="px-3 py-1.5 bg-white/10 hover:bg-white/20 border border-white/20 text-white rounded-xl text-xs font-bold transition backdrop-blur-sm">
                {lang === 'es' ? 'EN' : 'ES'}
              </button>
            </div>
          </div>

          {/* Nav tabs */}
          <div className="flex gap-1 overflow-x-auto" style={{ scrollbarWidth:'none' }}>
            {TABS.map(({ id, label }) => (
              <button key={id} onClick={() => setTab(id)}
                className={`px-5 py-2.5 text-sm font-semibold whitespace-nowrap transition ${tab === id ? 'tab-active text-white' : 'tab-inactive text-blue-200 hover:text-white'}`}>
                {label}
              </button>
            ))}
            {loading && <span className="ml-3 self-center text-xs text-blue-300 animate-pulse">⟳ Sync...</span>}
          </div>
        </div>
      </header>

      {/* ─── MAIN CONTENT ─── */}
      <main className="max-w-7xl mx-auto px-4 py-6">
        {tab === 'dashboard' && (
          <Dashboard
            expenses={expenses}
            rate={rate}
            t={t}
            lang={lang}
            month={month}
            year={year}
            onRateChange={setRate}
            apiUrl={apiUrl}
            onApiUrlChange={setApiUrl}
            onSync={syncData}
            loading={loading}
            syncMsg={syncMsg}
          />
        )}
        {tab === 'expenses' && (
          <ExpensesView
            expenses={expenses}
            onToggle={handleToggle}
            onEdit={handleEdit}
            onDelete={setDeleteId}
            onAdd={() => { setEditExp(null); setShowModal(true); }}
            rate={rate}
            t={t}
            lang={lang}
            month={month}
            year={year}
          />
        )}
        {tab === 'history' && <HistoryView history={history} t={t} lang={lang} />}
        {tab === 'setup'   && <SetupGuide t={t} />}
      </main>

      {/* ─── ADD / EDIT MODAL ─── */}
      {showModal && (
        <Modal title={editExp ? t.editExpense : t.addExpense} onClose={() => { setShowModal(false); setEditExp(null); }}>
          <ExpenseForm initial={editExp} onSave={handleSave} onCancel={() => { setShowModal(false); setEditExp(null); }} t={t} />
        </Modal>
      )}

      {/* ─── DELETE CONFIRM ─── */}
      {deleteId && (
        <Modal title={t.deleteConfirm} onClose={() => setDeleteId(null)}>
          <div className="space-y-4">
            <p className="text-sm text-slate-600 dark:text-slate-300">{t.deleteConfirm}</p>
            <div className="flex gap-3">
              <button onClick={() => handleDelete(deleteId)} className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl text-sm font-semibold transition">{t.deleteBtn}</button>
              <button onClick={() => setDeleteId(null)} className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-xl text-sm font-semibold transition">{t.cancel}</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
